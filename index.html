<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Redirecionamento automático via meta tag -->
    <meta http-equiv="refresh" content="0; url=src/pages/index.html">
    <title>Redirecionando...</title>
    <!-- Fallback de redirecionamento via script -->
    <script>
        window.location.replace("src/pages/index.html");
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px;">
    <!-- Fallback manual caso os redirecionamentos falhem -->
    <p>Se você não for redirecionado automaticamente, <a href="src/pages/index.html">clique aqui</a>.</p>
</body>
</html>
